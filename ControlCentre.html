<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlCentre — NuCCoL</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
/* ================================================================
   CSS VARIABLES & RESET
================================================================ */
:root {
  --navy:    #00126B;
  --blue:    #3860B9;
  --blue2:   #3860BA;
  --purple:  #6C2481;
  --white:   #FFFFFF;
  --bg:      #F3F4F8;
  --text:    #1F2937;
  --muted:   #6B7280;
  --border:  #D1D5DB;
  --row-alt: #F0F4FF;
  --green:   #16A34A;
  --red:     #DC2626;
  --orange:  #EA580C;
  --indigo:  #6366F1;
  --violet:  #9333EA;
  --teal:    #1E9DD9;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ================================================================
   LAYOUT
================================================================ */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ---- HEADER ---- */
.hdr {
  background: var(--blue);
  border-bottom: 3px solid var(--navy);
  padding: 0 28px;
  height: 86px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hdr-left { display: flex; align-items: center; gap: 16px; }
.hdr-title {
  font-family: 'Courier New', monospace;
  font-size: 26px;
  font-weight: bold;
  color: #fff;
  letter-spacing: 1px;
}
.hdr-sub {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: #BFDBFE;
  margin-top: 3px;
}
.hdr-right { display: flex; align-items: center; gap: 8px; }
.user-chip {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #BFDBFE;
}

/* ---- BACK BUTTON ---- */
.back-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.35);
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 5px 12px;
  font-weight: bold;
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.3); }

/* ---- MAIN CONTENT ---- */
.main {
  flex: 1;
  padding: 24px 28px 40px;
  overflow-x: auto;
}

/* ================================================================
   HOME SCREEN
================================================================ */
.home-grid {
  display: flex;
  gap: 24px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.home-card {
  background: #fff;
  border: 2px solid var(--border);
  width: 300px;
  padding: 36px 24px 28px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.home-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,18,107,0.12);
  border-color: var(--blue);
}
.home-card-icon {
  font-size: 44px;
  color: var(--purple);
  margin-bottom: 14px;
  line-height: 1;
}
.home-card h2 {
  font-family: 'Courier New', monospace;
  font-size: 17px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 10px;
}
.home-card p { font-size: 12px; color: var(--muted); line-height: 1.55; }

.home-stats {
  display: flex;
  gap: 24px;
  margin-top: 32px;
  flex-wrap: wrap;
}

/* ================================================================
   KPI CARDS
================================================================ */
.kpi-row {
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.kpi-card {
  background: #fff;
  border: 1px solid var(--border);
  padding: 14px 18px;
  flex: 1;
  min-width: 140px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.kpi-card:hover { border-color: var(--blue); }
.kpi-card.active { border-color: var(--blue); border-width: 2px; }
.kpi-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.kpi-val {
  font-size: 22px;
  font-weight: 600;
  line-height: 1;
}
.kpi-card-static {
  background: #fff;
  border: 1px solid var(--border);
  padding: 14px 18px;
  flex: 1;
  min-width: 140px;
}

/* ================================================================
   DATA TABLE
================================================================ */
.tbl-wrap {
  border: 2px solid var(--navy);
  overflow-x: auto;
  background: #fff;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  border: 2px solid var(--navy);
}
.data-table th {
  background: var(--teal);
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 8px 12px;
  border-right: 1px solid rgba(255,255,255,0.2);
  border-bottom: 2px solid var(--navy);
  white-space: nowrap;
}
.data-table th.hdr-blue { background: var(--blue); }
.data-table td {
  padding: 7px 12px;
  border-bottom: 1px solid #E5E7EB;
  font-size: 12px;
  background: #fff;
}
.data-table tbody tr:nth-child(even) td { background: var(--row-alt); }
.data-table tbody tr.clickable { cursor: pointer; }
.data-table tbody tr.clickable:hover td { background: #E0E7FF; }
.data-table tfoot td {
  background: #F0F4FF;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 12px;
  border-top: 2px solid var(--navy);
}
.ta-right { text-align: right; }
.ta-center { text-align: center; }
.nowrap { white-space: nowrap; }

/* ================================================================
   SECTION HEADING
================================================================ */
.section-hd {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  color: var(--navy);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 20px 0 6px;
  border-left: 3px solid var(--purple);
  padding-left: 8px;
}

/* ================================================================
   FILTER BAR
================================================================ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.filter-bar label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
}
.filter-bar select, .filter-bar input {
  border: 1px solid var(--border);
  padding: 5px 10px;
  font-size: 12px;
  background: #fff;
  color: var(--text);
  outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--blue); }

/* ================================================================
   INLINE SELECT / STATUS
================================================================ */
.inline-select {
  border: 1px solid var(--border);
  padding: 3px 6px;
  font-size: 12px;
  background: #fff;
  color: var(--text);
  outline: none;
  cursor: pointer;
  width: 100%;
}
.inline-select:focus { border-color: var(--blue); }

/* status badge colours */
.status-live    { color: var(--green); font-weight: 600; }
.status-complete { color: var(--blue); font-weight: 600; }
.status-lead    { color: var(--orange); font-weight: 600; }
.status-scoping { color: var(--indigo); font-weight: 600; }
.status-proposal { color: var(--violet); font-weight: 600; }
.status-rejected { color: var(--red); font-weight: 600; }

/* ================================================================
   PROJECT DETAIL
================================================================ */
.detail-kpi-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.detail-kpi {
  background: #fff;
  border: 1px solid var(--border);
  padding: 10px 14px;
  min-width: 160px;
  flex: 1;
}
.detail-kpi-label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}
.detail-kpi-val {
  font-size: 20px;
  font-weight: 600;
}
.detail-mini-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.detail-mini {
  background: #fff;
  border: 1px solid var(--border);
  padding: 8px 12px;
  min-width: 120px;
}
.detail-mini-label {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.detail-mini-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--blue);
}

/* ================================================================
   NOTES TEXTAREA
================================================================ */
.notes-wrap { margin-top: 14px; }
.notes-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  font-weight: bold;
  color: var(--navy);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  border-left: 3px solid var(--purple);
  padding-left: 8px;
}
.notes-textarea {
  width: 100%;
  border: 1px solid var(--navy);
  padding: 8px 10px;
  font-size: 13px;
  resize: vertical;
  min-height: 120px;
  outline: none;
  background: #fff;
}
.notes-textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(56,96,185,0.2); }

/* ================================================================
   BUTTON
================================================================ */
.btn {
  background: var(--blue);
  color: #fff;
  border: 2px solid var(--navy);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 12px;
  padding: 7px 18px;
  letter-spacing: 0.5px;
  transition: background 0.15s;
  cursor: pointer;
}
.btn:hover { background: var(--navy); }
.btn-sm {
  padding: 4px 12px;
  font-size: 11px;
}
.btn-ghost {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.35);
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 5px 14px;
  font-weight: bold;
  transition: background 0.15s;
  cursor: pointer;
}
.btn-ghost:hover { background: rgba(255,255,255,0.3); }

/* ================================================================
   FORM
================================================================ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  background: #fff;
  border: 1px solid var(--border);
  padding: 20px;
  margin-top: 12px;
}
.form-field label {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--navy);
  font-weight: bold;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.form-field input, .form-field select, .form-field textarea {
  width: 100%;
  border: 1px solid var(--navy);
  padding: 6px 9px;
  font-size: 13px;
  background: #fff;
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(56,96,185,0.2);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-field-full { grid-column: 1 / -1; }
.form-actions { margin-top: 16px; display: flex; gap: 10px; }

/* ================================================================
   LOADING / ERROR
================================================================ */
.loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  color: var(--muted);
  gap: 12px;
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ================================================================
   TOAST
================================================================ */
.toast {
  position: fixed;
  top: 20px; right: 20px;
  padding: 11px 20px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: bold;
  z-index: 9999;
  animation: toastIn 0.2s ease;
  max-width: 380px;
}
.toast.ok  { background: var(--green); color: #fff; }
.toast.err { background: var(--red);   color: #fff; }
@keyframes toastIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

/* ================================================================
   INLINE EDIT ROW INPUT
================================================================ */
.row-inp {
  width: 100%;
  border: 1px solid var(--border);
  padding: 3px 6px;
  font-size: 12px;
  background: #fff;
  color: var(--text);
  outline: none;
}
.row-inp:focus { border-color: var(--blue); }
</style>
</head>

<body>
<div id="app">
  <div class="loading" id="login-screen">
    <div style="text-align:center;font-family:'Courier New',monospace;">
      <div style="font-size:22px;font-weight:bold;color:var(--navy);margin-bottom:8px;">ControlCentre — NuCCoL</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:32px;">Sign in with your NuCCoL Microsoft account</div>
      <button id="login-btn" style="background:var(--blue);color:#fff;border:2px solid var(--navy);font-family:'Courier New',monospace;font-size:14px;font-weight:bold;padding:12px 32px;cursor:pointer;letter-spacing:0.5px;">
        Sign in with Microsoft
      </button>
      <div id="login-error" style="color:var(--red);font-size:12px;margin-top:16px;display:none;"></div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   CONFIGURATION
================================================================ */
const CFG = {
  tenantId : 'd44192f5-1023-458c-9cb3-9ff7e9c6d4ad',
  clientId : 'ec0a6806-59e8-4ea9-8ff5-6bdb1ba87baf',
  siteUrl  : 'https://nuccol.sharepoint.com/sites/ProjectControl',
  scope    : 'https://nuccol.sharepoint.com/.default',
  lists: {
    projects         : 'Projects',
    pipelineProjects : 'PipelineProjects',
    timeEntries      : 'TimeEntries',
    expenses         : 'Expenses',
    employees        : 'Employees'
  },
  pipelineStatuses: ['Lead','Scoping','Proposal Sent','Proposal Rejected','Won','Lost'],
  projectStatuses : ['Live','Complete','On Hold'],
  owners: ['Stephen Kinsey','Steven Farey','John Hilton-Brammer','Rene Dorset','Liz Gregory'],
  pipelineCategories: []  // loaded dynamically
};

/* ================================================================
   MSAL
================================================================ */
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId  : CFG.clientId,
    authority : `https://login.microsoftonline.com/${CFG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
});

async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) { await msalApp.loginRedirect({ scopes: [CFG.scope] }); return; }
  msalApp.setActiveAccount(accounts[0]);
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: [CFG.scope], account: accounts[0] });
    return r.accessToken;
  } catch { await msalApp.acquireTokenRedirect({ scopes: [CFG.scope] }); }
}

/* ================================================================
   SHAREPOINT REST
================================================================ */
async function spGet(path) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/json;odata=nometadata' }
  });
  if (!res.ok) throw new Error(`GET ${res.status}: ${path}`);
  return res.json();
}

async function spPost(path, body) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`POST ${res.status}: ${t}`); }
  const t = await res.text();
  return t ? JSON.parse(t) : {};
}

async function spPatch(path, body) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'X-HTTP-Method': 'MERGE',
      'If-Match': '*'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`PATCH ${res.status}: ${t}`); }
}

const listItems = n => `web/lists/getbytitle('${encodeURIComponent(n)}')/items`;
const listItem  = (n,id) => `web/lists/getbytitle('${encodeURIComponent(n)}')/items(${id})`;

// Fetches a list with an expand; if 400, retries without $select to get all fields
async function spGetSafe(path, selectFields, expandField, top=500) {
  const url = `${path}?$select=${selectFields},${expandField}/DisplayName&$expand=${expandField}&$top=${top}&$orderby=Date desc`;
  try {
    return await spGet(url);
  } catch(e) {
    if (e.message.startsWith('GET 400')) {
      return await spGet(`${path}?$expand=${expandField}&$top=${top}&$orderby=Date desc`);
    }
    throw e;
  }
}

// Fetch a list with specific fields; if 400 (field doesn't exist), retry without $select
async function spGetWithFallback(listName, fields, top=500, orderBy='Title') {
  const base = listItems(listName);
  try {
    return await spGet(`${base}?$select=${fields}&$top=${top}&$orderby=${orderBy} asc`);
  } catch(e) {
    if (e.message.startsWith('GET 400')) {
      // Some fields may not exist — fall back to no $select
      try {
        return await spGet(`${base}?$top=${top}&$orderby=Title asc`);
      } catch(e2) {
        return await spGet(`${base}?$top=${top}`);
      }
    }
    throw e;
  }
}

/* ================================================================
   UTILITIES
================================================================ */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(v) {
  const n = Number(v) || 0;
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function moneyDec(v) {
  const n = Number(v) || 0;
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function num(v) { return Number(v || 0).toLocaleString('en-GB', { maximumFractionDigits: 1 }); }
function pct(v) { return (Number(v) || 0).toFixed(1) + '%'; }
function ukDate(s) {
  if (!s) return '—';
  const d = new Date(s.split('T')[0] + 'T12:00:00');
  return d.toLocaleDateString('en-GB');
}
function statusClass(s) {
  const m = { 'Live':'status-live','Complete':'status-complete','Lead':'status-lead',
    'Scoping':'status-scoping','Proposal Sent':'status-proposal','Proposal Rejected':'status-rejected',
    'Won':'status-live','Lost':'status-rejected' };
  return m[s] || '';
}
function render(html) { document.getElementById('app').innerHTML = html; }
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ================================================================
   APP STATE
================================================================ */
const S = {
  view: 'loading',
  currentUser: null,
  // cached data
  projects: [],
  pipeline: [],
  timeEntries: [],
  expenses: [],
  // selections
  selectedProject: null,
  selectedPipeline: null,
  selectedEmployee: null,
  // filters
  projectFilter: '',   // '', 'Live', 'Complete', 'InBudget', 'OverBudget'
  pipelineFilter: '',
  // for employee drill-down
  drillProjectId: null,
  drillProjectTitle: '',
  drillProjectDisplayName: '',
  drillIsPipeline: false
};

/* ================================================================
   DATA LOADERS
================================================================ */
async function loadAll() {
  render('<div class="loading"><div class="loading-spinner"></div>Loading data…</div>');

  // Load user
  const u = await spGet('web/currentuser');
  S.currentUser = { email: u.Email, displayName: u.Title };

  // Load all data in parallel
  // Fetch all lists without $select to avoid field name guessing.
  // We fetch full items and normalise field names after.
  // Load Projects and Pipeline first — request DisplayName explicitly, fall back gracefully
  const [proj, pipe] = await Promise.all([
    spGetWithFallback(CFG.lists.projects,
      'ID,Title,DisplayName,ProjectTitle,Company,POValue,PlannedHours,StartDate,EndDate,Notes,Status,ProjectNumber',
      500, 'DisplayName'),
    spGetWithFallback(CFG.lists.pipelineProjects,
      'ID,Title,DisplayName,ProjectTitle,Company,ExpectedValue,Probability,Status,Notes,ExpectedStart,Owner,Category,Contact,ProjectNumber',
      500, 'DisplayName')
  ]);

  // Try TimeEntries with expand; if 400 (lookup column name wrong), fall back to no expand
  let teRaw;
  try {
    teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$expand=Project,PipelineProject&$top=5000&$orderby=Date desc`);
    S._teHasExpand = true;
  } catch(e1) {
    try {
      // Try common alternative names
      teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$expand=ProjectLookup,PipelineProjectLookup&$top=5000&$orderby=Date desc`);
      S._teHasExpand = true;
    } catch(e2) {
      // Fall back: no expand at all — we'll match via *Id integer fields
      teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$top=5000&$orderby=Date desc`);
      S._teHasExpand = false;
    }
  }

  // Try Expenses with expand; fall back to no expand
  let expRaw;
  try {
    expRaw = await spGet(`${listItems(CFG.lists.expenses)}?$expand=EmployeeName&$top=2000&$orderby=Date desc`);
  } catch(e) {
    expRaw = await spGet(`${listItems(CFG.lists.expenses)}?$top=2000&$orderby=Date desc`);
  }

  const te = teRaw;
  const exp = expRaw;

  // Detect field names from first Projects item
  const sampleProj = proj.value[0] || {};
  const projTitleField    = Object.keys(sampleProj).find(k => ['ProjectTitle0','ProjectTitle'].includes(k)) || 'Title';
  const poValueField      = Object.keys(sampleProj).find(k => k.toLowerCase() === 'povalue') || 'POValue';
  const plannedHoursField = Object.keys(sampleProj).find(k => k.toLowerCase() === 'plannedhours') || 'PlannedHours';

  // Detect field names from first PipelineProjects item
  const samplePipe = pipe.value[0] || {};
  const pipeCompanyField  = Object.keys(samplePipe).find(k => k.toLowerCase() === 'company') || 'Title';
  const pipeTitleField    = Object.keys(samplePipe).find(k => ['ProjectTitle','ProjectTitle0'].includes(k)) || null;
  const pipeValueField    = Object.keys(samplePipe).find(k => k.toLowerCase() === 'expectedvalue') || 'ExpectedValue';
  const pipeProbField     = Object.keys(samplePipe).find(k => k.toLowerCase() === 'probability') || 'Probability';
  const pipeExpStartField = Object.keys(samplePipe).find(k => k.toLowerCase() === 'expectedstart') || 'ExpectedStart';

  // Log what we got back so debugging is easy
  console.log('[ControlCentre] Projects sample keys:', Object.keys(sampleProj).join(', '));
  console.log('[ControlCentre] Pipeline sample keys:', Object.keys(samplePipe).join(', '));

  // Detect TimeEntries lookup field names from returned data
  const sampleTE = te.value[0] || {};
  let teProjField, tePipeField;
  if (S._teHasExpand) {
    teProjField = Object.keys(sampleTE).find(k => !k.endsWith('Id') && sampleTE[k] && typeof sampleTE[k] === 'object' && 'Id' in sampleTE[k] && k.toLowerCase().includes('project') && !k.toLowerCase().includes('pipeline')) || 'Project';
    tePipeField = Object.keys(sampleTE).find(k => !k.endsWith('Id') && sampleTE[k] && typeof sampleTE[k] === 'object' && 'Id' in sampleTE[k] && k.toLowerCase().includes('pipeline')) || 'PipelineProject';
  } else {
    teProjField = null;
    tePipeField = null;
    S._teProjIdField  = Object.keys(sampleTE).find(k => /^project.*id$/i.test(k) && !k.toLowerCase().includes('pipeline')) || 'ProjectId';
    S._tePipeIdField  = Object.keys(sampleTE).find(k => /pipeline.*id$/i.test(k)) || 'PipelineProjectId';
  }

  // Store for computed helpers
  S._projTitleField    = projTitleField;
  S._poValueField      = poValueField;
  S._plannedHoursField = plannedHoursField;
  S._teProjField       = teProjField;
  S._tePipeField       = tePipeField;

  S.projects = proj.value.map(p => ({
    ...p,
    ProjectTitle:  p[projTitleField] || p.Title || '',
    // DisplayName is confirmed to exist on the Projects list - use it directly
    // Fall back chain: DisplayName -> ProjectTitle field -> Title
    DisplayName:   (p.DisplayName && p.DisplayName.trim()) || p[projTitleField] || p.Title || '',
    POValue:       Number(p[poValueField] ?? 0),
    PlannedHours:  Number(p[plannedHoursField] ?? 0)
  }));
  S.pipeline = pipe.value.map(p => ({
    ...p,
    Company:       p[pipeCompanyField] || p.Title || '',
    ProjectTitle:  (pipeTitleField && p[pipeTitleField]) || p.Title || '',
    // DisplayName is confirmed to exist on the PipelineProjects list - use it directly
    DisplayName:   (p.DisplayName && p.DisplayName.trim()) || (pipeTitleField && p[pipeTitleField]) || p[pipeCompanyField] || p.Title || '',
    ExpectedValue: Number(p[pipeValueField] ?? 0),
    Probability:   p[pipeProbField] ?? null,
    ExpectedStart: p[pipeExpStartField] || null
  }));
  S.timeEntries = te.value;
  S.expenses = exp.value;
}

/* ================================================================
   COMPUTED HELPERS
================================================================ */
function teForProject(projId) {
  if (S._teHasExpand && S._teProjField) {
    const f = S._teProjField;
    return S.timeEntries.filter(t => t[f] && t[f].Id === projId);
  }
  // No expand — match via integer Id field
  const f = S._teProjIdField || 'ProjectId';
  return S.timeEntries.filter(t => t[f] === projId);
}
function teForPipeline(pipeId) {
  if (S._teHasExpand && S._tePipeField) {
    const f = S._tePipeField;
    return S.timeEntries.filter(t => t[f] && t[f].Id === pipeId);
  }
  const f = S._tePipeIdField || 'PipelineProjectId';
  return S.timeEntries.filter(t => t[f] === pipeId);
}
function expForProject(displayName) {
  return S.expenses.filter(e => e.Project === displayName);
}
function expForEmployee(displayName, empName) {
  return S.expenses.filter(e => e.Project === displayName && e.EmployeeName && e.EmployeeName.DisplayName === empName);
}
function sumHours(entries) { return entries.reduce((a,e) => a + (e.HoursWorked||0) + (e.TravelHours||0), 0); }
function sumStaff(entries) { return entries.reduce((a,e) => a + (e.StaffCost||0), 0); }
function sumCommercial(entries) { return entries.reduce((a,e) => a + (e.CommercialCost||0), 0); }
function sumExpenses(exps) { return exps.reduce((a,e) => a + (e.Amount||0), 0); }

function groupByEmployee(entries) {
  const map = {};
  for (const e of entries) {
    const n = e.EmployeeName || 'Unknown';
    if (!map[n]) map[n] = [];
    map[n].push(e);
  }
  return Object.entries(map).map(([name, rows]) => ({
    name,
    hours: rows.reduce((a,r) => a + (r.HoursWorked||0), 0),
    travel: rows.reduce((a,r) => a + (r.TravelHours||0), 0),
    staffCost: rows.reduce((a,r) => a + (r.StaffCost||0), 0),
    commercialCost: rows.reduce((a,r) => a + (r.CommercialCost||0), 0)
  })).sort((a,b) => a.name.localeCompare(b.name));
}

function filteredProjects() {
  const f = S.projectFilter;
  return S.projects.filter(p => {
    const te = teForProject(p.ID);
    const spend = sumCommercial(te);
    if (f === 'Live') return (p.Status?.Value || p.Status) === 'Live';
    if (f === 'Complete') return (p.Status?.Value || p.Status) === 'Complete';
    if (f === 'InBudget') return spend <= (p.POValue||0);
    if (f === 'OverBudget') return spend > (p.POValue||0);
    return true;
  });
}

    if (p) p.Notes = notes;
    toast('Notes saved');
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

/* ================================================================
   EMPLOYEE TIME ENTRIES SCREEN
================================================================ */
function viewEmployeeEntries(projId, projTitle, projDisplayName, empName, isPipeline) {
  S.drillProjectId = projId;
  S.drillProjectTitle = projTitle;
  S.drillProjectDisplayName = projDisplayName;
  S.selectedEmployee = empName;
  S.drillIsPipeline = isPipeline;
  S.view = 'employeeEntries';
  _renderEmployeeEntries();
}

function _renderEmployeeEntries() {
  const empName = S.selectedEmployee;
  const isPipe = S.drillIsPipeline;

  let entries, exps;
  const _pf = S._teHasExpand && S._teProjField ? S._teProjField : null;
  const _ppf = S._teHasExpand && S._tePipeField ? S._tePipeField : null;
  const _pfId = S._teProjIdField || 'ProjectId';
  const _ppfId = S._tePipeIdField || 'PipelineProjectId';
  if (isPipe) {
    entries = S.timeEntries.filter(t =>
      (_ppf ? (t[_ppf] && t[_ppf].Id === S.drillProjectId) : t[_ppfId] === S.drillProjectId)
      && t.EmployeeName === empName
    );
  } else {
    entries = S.timeEntries.filter(t =>
      (_pf ? (t[_pf] && t[_pf].Id === S.drillProjectId) : t[_pfId] === S.drillProjectId)
      && t.EmployeeName === empName
    );
  }
  exps = S.expenses.filter(e =>
    e.Project === S.drillProjectDisplayName && e.EmployeeName?.DisplayName === empName
  );

  const th = entries.reduce((a,e)=>a+(e.HoursWorked||0),0);
  const tt = entries.reduce((a,e)=>a+(e.TravelHours||0),0);
  const ts = sumStaff(entries);
  const tc = sumCommercial(entries);
  const te = sumExpenses(exps);

  const teRows = entries.length ? entries.map(e => `
    <tr>
      <td class="nowrap">${ukDate(e.Date)}</td>
      <td>${esc((e[_pf] && (e[_pf][S._projTitleField||'Title'] || e[_pf].Title)) || (e[_ppf] && e[_ppf].ProjectTitle) || S.drillProjectDisplayName || '')}</td>
      <td class="ta-center">${num(e.HoursWorked)}</td>
      <td class="ta-center">${num(e.TravelHours)}</td>
      <td class="ta-right">${money(e.StaffCost)}</td>
      <td class="ta-right">${money(e.CommercialCost)}</td>
      <td>${esc(e.Notes||'')}</td>
    </tr>`).join('')
    : `<tr><td colspan="7" class="ta-center" style="padding:14px;color:var(--muted);">No time entries</td></tr>`;

  const expRows = exps.length ? exps.map(e => `
    <tr>
      <td class="nowrap">${ukDate(e.Date)}</td>
      <td>${esc(e.Project||'')}</td>
      <td class="ta-center">${esc(e.Category||'')}</td>
      <td class="ta-right">${moneyDec(e.Amount)}</td>
      <td>${esc(e.Notes||'')}</td>
    </tr>`).join('')
    : `<tr><td colspan="5" class="ta-center" style="padding:14px;color:var(--muted);">No expenses</td></tr>`;

  const backFn = isPipe ? `viewPipelineDetail(${S.drillProjectId})` : `viewProjectDetail(${S.drillProjectId})`;

  render(`
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" onclick="${backFn}">← Back</button>
        <div>
          <div class="hdr-title" style="font-size:18px;">${esc(empName)} — TimeSink</div>
          <div class="hdr-sub">${esc(S.drillProjectDisplayName)}</div>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="kpi-row">
        ${kpi('Total Hours', num(th), 'var(--blue)')}
        ${kpi('Travel Hours', num(tt), 'var(--orange)')}
        ${kpi('Expenses', moneyDec(te), 'var(--green)')}
        ${kpi('Staff Cost', money(ts), 'var(--violet)')}
        ${kpi('Charge Rate', money(tc), 'var(--indigo)')}
      </div>

      <div class="section-hd">Time Entries</div>
      <table class="data-table">
        <thead><tr>
          <th style="width:100px;">Date</th>
          <th>Project</th>
          <th class="ta-center" style="width:80px;">Hours</th>
          <th class="ta-center" style="width:80px;">Travel</th>
          <th class="ta-right" style="width:110px;">Staff Rate</th>
          <th class="ta-right" style="width:120px;">Charge Rate</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>${teRows}</tbody>
        ${entries.length ? `<tfoot><tr>
          <td colspan="2">TOTAL</td>
          <td class="ta-center">${num(th)}</td>
          <td class="ta-center">${num(tt)}</td>
          <td class="ta-right">${money(ts)}</td>
          <td class="ta-right">${money(tc)}</td>
          <td></td>
        </tr></tfoot>` : ''}
      </table>

      <div class="section-hd" style="margin-top:24px;">Expenses</div>
      <table class="data-table">
        <thead><tr>
          <th style="width:100px;">Date</th>
          <th>Project</th>
          <th class="ta-center" style="width:150px;">Category</th>
          <th class="ta-right" style="width:110px;">Amount</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>${expRows}</tbody>
        ${exps.length ? `<tfoot><tr>
          <td colspan="3">TOTAL</td>
          <td class="ta-right">${moneyDec(te)}</td>
          <td></td>
        </tr></tfoot>` : ''}
      </table>
    </div>
  `);
}

function kpi(label, val, color) {
  return `<div class="kpi-card-static">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val" style="color:${color}">${val}</div>
  </div>`;
}

/* ================================================================
   PIPELINE SCREEN
================================================================ */
function viewPipeline() {
  S.view = 'pipeline';
  _renderPipeline();
}

function _renderPipeline() {
  const total = S.pipeline.length;
  const totalVal = S.pipeline.reduce((a,p) => a + (p.ExpectedValue||0), 0);
  const weighted = S.pipeline.reduce((a,p) => a + (p.ExpectedValue||0) * ((p.Probability||0)/100), 0);
  const avgProb = total ? S.pipeline.reduce((a,p) => a + (p.Probability||0), 0) / total : 0;
  const sunkHours = S.timeEntries
    .filter(t => t.ProjectType?.Value === 'Pipeline Project' || t.ProjectType === 'Pipeline Project')
    .reduce((a,t) => a + (t.HoursWorked||0) + (t.TravelHours||0), 0);

  const rows = S.pipeline.map(p => {
    const st = p.Status?.Value || p.Status || '';
    const bookedHours = sumHours(teForPipeline(p.ID));

    return `<tr>
      <td class="clickable" onclick="viewPipelineDetail(${p.ID})" style="cursor:pointer;">
        <div style="font-weight:600;font-size:12px;">${esc(p.DisplayName)}</div>
      </td>
      <td>
        <select class="inline-select" onchange="updatePipelineStatus(${p.ID},this.value)">
          ${statusOpts(CFG.pipelineStatuses, st)}
        </select>
      </td>
      <td class="ta-right nowrap">${money(p.ExpectedValue)}</td>
      <td class="ta-center">${esc(p.Owner?.DisplayName || p.Owner || '—')}</td>
      <td class="ta-center">${p.Probability != null ? p.Probability + '%' : '—'}</td>
      <td class="ta-center">${num(bookedHours)}</td>
      <td style="font-size:11px;color:var(--muted);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(p.Notes||'')}">${esc(p.Notes||'')}</td>
    </tr>`;
  }).join('');

  render(`
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" onclick="viewHome()">← Back</button>
        <div>
          <div class="hdr-title">Project Pipeline</div>
          <div class="hdr-sub">Track and manage potential projects</div>
        </div>
      </div>
      <div class="hdr-right">
        <button class="btn-ghost" onclick="viewAddProject()">+ Add Project</button>
        <span class="user-chip">${esc(S.currentUser?.displayName||'')}</span>
      </div>
    </div>
    <div class="main">
      <div class="kpi-row">
        <div class="kpi-card-static">
          <div class="kpi-label">Total Pipeline</div>
          <div class="kpi-val" style="color:var(--blue)">${total}</div>
        </div>
        <div class="kpi-card-static">
          <div class="kpi-label">Total Value</div>
          <div class="kpi-val" style="color:var(--green)">${money(totalVal)}</div>
        </div>
        <div class="kpi-card-static">
          <div class="kpi-label">Weighted Value</div>
          <div class="kpi-val" style="color:var(--violet)">${money(Math.round(weighted))}</div>
        </div>
        <div class="kpi-card-static">
          <div class="kpi-label">Avg Probability</div>
          <div class="kpi-val" style="color:var(--orange)">${Math.round(avgProb)}%</div>
        </div>
        <div class="kpi-card-static">
          <div class="kpi-label">Sunk Hours</div>
          <div class="kpi-val" style="color:var(--orange)">${num(sunkHours)}</div>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="data-table">
          <thead><tr>
            <th style="min-width:220px;text-align:left;">Project</th>
            <th style="width:160px;">Status</th>
            <th style="width:100px;text-align:right;">Value</th>
            <th style="width:140px;">Owner / PM</th>
            <th style="width:90px;">Probability</th>
            <th style="width:90px;">Sunk Hrs</th>
            <th>Notes</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="7" class="ta-center" style="padding:20px;color:var(--muted);">No pipeline projects</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `);
}

async function updatePipelineStatus(projId, newStatus) {
  try {
    await spPatch(listItem(CFG.lists.pipelineProjects, projId), {
      StatusId: null,
      Status: { Value: newStatus }
    });
    const p = S.pipeline.find(x => x.ID === projId);
    if (p) { if (p.Status?.Value !== undefined) p.Status.Value = newStatus; else p.Status = newStatus; }
    toast('Status updated');
  } catch(e) { toast('Update failed: ' + e.message, 'err'); }
}

/* ================================================================
   PIPELINE DETAIL SCREEN
================================================================ */
function viewPipelineDetail(projId) {
  const p = S.pipeline.find(x => x.ID === projId);
  if (!p) return;
  S.selectedPipeline = p;
  S.view = 'pipelineDetail';
  _renderPipelineDetail();
}

function _renderPipelineDetail() {
  const p = S.selectedPipeline;
  const te = teForPipeline(p.ID);
  const exps = expForProject(p.DisplayName);
  const hoursBooked = sumHours(te);
  const staffCost = sumStaff(te);
  const commercial = sumCommercial(te);
  const totalExp = sumExpenses(exps);
  const empRows = groupByEmployee(te);
  const st = p.Status?.Value || p.Status || '';

  const empTableRows = empRows.map(e => {
    const empExps = sumExpenses(expForEmployee(p.DisplayName, e.name));
    return `<tr class="clickable" onclick="viewEmployeeEntries(${p.ID},'${esc(p.ProjectTitle)}','${esc(p.DisplayName)}','${esc(e.name)}',true)">
      <td>${esc(e.name)}</td>
      <td class="ta-center">${num(e.hours)}</td>
      <td class="ta-center">${num(e.travel)}</td>
      <td class="ta-right">${moneyDec(empExps)}</td>
      <td class="ta-right">${money(e.staffCost)}</td>
      <td class="ta-right">${money(e.commercialCost)}</td>
    </tr>`;
  }).join('');

  render(`
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" onclick="viewPipeline()">← Back</button>
        <div>
          <div class="hdr-title" style="font-size:18px;">${esc(p.DisplayName)} — Project Summary</div>
          <div class="hdr-sub"><span style="color:rgba(219,234,254,0.9)">${esc(st)}</span></div>
        </div>
      </div>
      <div class="hdr-right" style="gap:10px;">
        <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#BFDBFE;">
          <div style="font-size:10px;opacity:0.7;margin-bottom:2px;">EXP. START</div>
          <div>${ukDate(p.ExpectedStart)}</div>
        </div>
        <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;font-family:'Courier New',monospace;font-size:11px;color:#BFDBFE;">
          <div style="font-size:10px;opacity:0.7;margin-bottom:2px;">EXP. VALUE</div>
          <div>${money(p.ExpectedValue)}</div>
        </div>
        <button class="btn-ghost" onclick="savePipelineNotes(${p.ID})">💾 Save Notes</button>
        <span class="user-chip">${esc(S.currentUser?.displayName||'')}</span>
      </div>
    </div>
    <div class="main">
      <div class="detail-kpi-row">
        <div class="detail-kpi">
          <div class="detail-kpi-label">Hours Booked</div>
          <div class="detail-kpi-val" style="color:var(--orange)">${num(hoursBooked)}</div>
        </div>
        <div class="detail-kpi">
          <div class="detail-kpi-label">Total Expenses</div>
          <div class="detail-kpi-val" style="color:var(--indigo)">${moneyDec(totalExp)}</div>
        </div>
        <div class="detail-kpi">
          <div class="detail-kpi-label">Cost Rate</div>
          <div class="detail-kpi-val" style="color:var(--indigo)">${moneyDec(staffCost)}</div>
        </div>
        <div class="detail-kpi">
          <div class="detail-kpi-label">Charge Rate</div>
          <div class="detail-kpi-val" style="color:var(--indigo)">${moneyDec(commercial)}</div>
        </div>
        <div class="detail-kpi">
          <div class="detail-kpi-label">Probability</div>
          <div class="detail-kpi-val" style="color:var(--violet)">${p.Probability != null ? p.Probability + '%' : '—'}</div>
        </div>
      </div>

      <div class="section-hd">Team Breakdown</div>
      <div class="tbl-wrap">

          <thead><tr>
            <th style="text-align:left;">Name</th>
            <th style="width:80px;">Hours</th>
            <th style="width:80px;">Travel</th>
            <th style="width:110px;">Expenses</th>
            <th style="width:110px;">Staff Rate</th>
            <th style="width:120px;">Commercial Rate</th>
          </tr></thead>
          <tbody>${empTableRows || '<tr><td colspan="6" class="ta-center" style="padding:14px;color:var(--muted);">No time entries</td></tr>'}</tbody>
        </table>
      </div>

      <div class="notes-wrap" style="margin-top:16px;">
        <div class="notes-label">Updates</div>
        <textarea id="pipelineNotes" class="notes-textarea" placeholder="Add project notes here…">${esc(p.Notes||'')}</textarea>

async function savePipelineNotes(projId) {
  try {
    const notes = document.getElementById('pipelineNotes')?.value || '';
    await spPatch(listItem(CFG.lists.pipelineProjects, projId), { Notes: notes });
    const p = S.pipeline.find(x => x.ID === projId);
    if (p) p.Notes = notes;
    toast('Notes saved');
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

  S.view = 'addProject';

          </select>

      </div>

        <button class="btn" style="background:var(--muted);border-color:var(--muted);" onclick="viewHome()">Cancel</button>
      </div>
    </div>
  `);
  // Load category choices dynamically
  loadPipelineCategories();
}

async function loadPipelineCategories() {
  try {
    const data = await spGet(`web/lists/getbytitle('${encodeURIComponent(CFG.lists.pipelineProjects)}')/fields?$filter=EntityPropertyName eq 'Category0' or InternalName eq 'Category0'`);
    const sel = document.getElementById('f_category');
    if (!sel) return;
    // Try choices endpoint
    const ch = await spGet(`web/lists/getbytitle('${encodeURIComponent(CFG.lists.pipelineProjects)}')/fields?$filter=InternalName eq 'Category0'&$select=Choices`);
    const choices = ch.value?.[0]?.Choices || [];
    choices.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  } catch(e) { /* category choices not critical */ }
}

async function submitNewProject() {
  const company = document.getElementById('f_company')?.value?.trim();
  const projectTitle = document.getElementById('f_projectTitle')?.value?.trim();
  if (!company) { toast('Company / Project Name is required', 'err'); return; }

  const body = {
    Company_x002f_ProjectName: company,
    ProjectTitle: projectTitle || company,
    ProjectNumber: document.getElementById('f_projectNumber')?.value?.trim() || null,
    Status: { Value: document.getElementById('f_status')?.value || 'Lead' },
    ExpectedValue: parseFloat(document.getElementById('f_value')?.value) || null,
    Probability: parseInt(document.getElementById('f_probability')?.value) || null,
    ExpectedStart: document.getElementById('f_startDate')?.value || null,
    Notes: document.getElementById('f_notes')?.value?.trim() || null,
    Contact: document.getElementById('f_contact')?.value?.trim() || null
  };

  const ownerVal = document.getElementById('f_owner')?.value;
  if (ownerVal) body.Owner = ownerVal;
  const catVal = document.getElementById('f_category')?.value;
  if (catVal) body.Category = { Value: catVal };

  try {
    const created = await spPost(listItems(CFG.lists.pipelineProjects), body);
    // Add to local state
    S.pipeline.push({
      ...body,
      ID: created.ID || created.Id,
      DisplayName: company,
      Company: company
    });
    toast('Project added successfully!');
    viewPipeline();
  } catch(e) { toast('Error saving project: ' + e.message, 'err'); }
}

/* ================================================================
   INIT
================================================================ */
async function init() {
  try {
    await msalApp.initialize();
    const redirectResult = await msalApp.handleRedirectPromise();
    if (redirectResult) msalApp.setActiveAccount(redirectResult.account);

    const accounts = msalApp.getAllAccounts();
    if (!accounts.length) {
      const btn = document.getElementById('login-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Redirecting…';
          try {
            await msalApp.loginRedirect({ scopes: [CFG.scope] });
          } catch(err) {
            btn.disabled = false;
            btn.textContent = 'Sign in with Microsoft';
            const errDiv = document.getElementById('login-error');
            if (errDiv) { errDiv.textContent = err.message; errDiv.style.display = 'block'; }
          }
        });
      }
      return;
    }
    msalApp.setActiveAccount(accounts[0]);
    await loadAll();
    viewHome();
  } catch(e) {
    render(`
      <div class="loading">
        <div style="color:var(--red);font-family:'Courier New',monospace;font-size:14px;text-align:center;max-width:500px;">
          <strong>Error:</strong> ${esc(e.message)}<br><br>
          Check that tenantId, clientId, and siteUrl are configured correctly.
          <br><br>
          <button onclick="init()" style="font-family:'Courier New',monospace;padding:8px 18px;cursor:pointer;background:var(--blue);color:#fff;border:2px solid var(--navy);font-weight:bold;">
            Retry
          </button>
        </div>
      </div>`);
  }
}

init();
